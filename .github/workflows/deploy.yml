name: "🚀 Build and Deploy to Cloudflare Workers"

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'AGENTS.md'
      - 'CLAUDE.md'
      - 'README.md'
      - '*.md'
      - 'LICENSE'
  pull_request:
    paths-ignore:
      - 'AGENTS.md'
      - 'CLAUDE.md'
      - 'README.md'
      - '*.md'
      - 'LICENSE'
  workflow_dispatch:
  repository_dispatch:
    types:
      - tokenuse-release

permissions:
  contents: read
  deployments: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    name: "🏗️ Build and Deploy"
    runs-on: ubuntu-latest
    env:
      TOKENUSE_SOURCE_DIR: .generated/tokenuse-source
      TOKENUSE_SOURCE_REF: ${{ github.event.client_payload.release_tag || 'main' }}

    steps:
      - name: "👨‍💻 Checkout site"
        uses: actions/checkout@v6

      - name: "📚 Checkout tokenuse docs"
        uses: actions/checkout@v6
        with:
          repository: russmckendrick/tokenuse
          ref: ${{ env.TOKENUSE_SOURCE_REF }}
          path: .generated/tokenuse-source

      - name: "🌸 Setup PNPM"
        uses: pnpm/action-setup@v6

      - name: "🟢 Set up Node.js"
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: pnpm

      - name: "📦 Install dependencies"
        run: pnpm install --frozen-lockfile

      - name: "🔒 Security audit"
        run: pnpm audit

      - name: "🔎 Check site"
        run: pnpm run check

      - name: "💾 Build cache"
        uses: actions/cache@v5
        with:
          path: |
            node_modules/.cache
            .astro
          key: tokenuse-site-build-${{ runner.os }}-${{ hashFiles('src/**/*', 'scripts/**/*', 'package.json', 'pnpm-lock.yaml') }}
          restore-keys: |
            tokenuse-site-build-${{ runner.os }}-

      - name: "🏗️ Build site"
        run: pnpm run build
        env:
          NODE_ENV: production
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: "📊 Build summary"
        run: |
          echo "### Build Complete! 🎉" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tokenuse source ref:** ${TOKENUSE_SOURCE_REF}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Build Directory Size:**" >> $GITHUB_STEP_SUMMARY
          du -sh dist >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Files Generated:**" >> $GITHUB_STEP_SUMMARY
          find dist -type f | wc -l >> $GITHUB_STEP_SUMMARY

      - name: "🚀 Deploy to Cloudflare Workers"
        if: github.event_name != 'pull_request'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy

      - name: "📝 Comment on PR"
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ Build successful! Production deploy skipped for PRs.'
            })
